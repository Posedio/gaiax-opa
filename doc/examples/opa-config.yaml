server:
  #logger_plugin: file_logger


decision_logs:
  plugin: file_logger
  #console: true


plugins:
  grpc:
    addr: ":50051"
  danube:
    issuer: "did:web:did.dumss.me"
    #keyPath: "/run/secrets/key.pem" #for docker compose
    keyPath: "key.pem"
    sigAlgo: "PS256"
    verificationMethod: "did:web:did.dumss.me#v1-2026"
    path: "/danube"
    compliancePolicies:
      - policy: "data.compliance.legalPerson"
        trustScope: CUSTOM_PONTUSX_GX_PARTICIPANT
        idPrefix: "https://example.com/trustedParty" #only needed if vcid is not set in request query
  file_logger:
    path: ./decision.log
    max_size_mb: 100
    max_age_days: 28
    max_backups: 3
    #compress: true
    level: debug
  external_pdp:
    sources:
      legalPerson: "http://127.0.0.1:8181/v1/data/verify/legalPerson"
      danube: "http://127.0.0.1:8181/danube/CUSTOM_PONTUSX_GX_PARTICIPANT"
  cli_exec:
    commands:
      #validate_vat: ["/usr/bin/python3", "/scripts/validate_vat.py"] #for docker compose
      validate_vat: ["python3", "./doc/examples/pythonScripts/validate_vat.py"]