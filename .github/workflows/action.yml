name: Go CI

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]

env:
  OUTPUT_NAME: ${{ github.event.repository.name }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26
    env:
      GOPATH: ${{ github.workspace }}/.go
    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            .go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Download Go modules
        run: go mod download

      - name: Run go fmt
        run: go fmt ./...

      - name: Run go vet
        run: go vet -buildvcs=false ./...

      - name: Run tests with tag gaiax_ovc
        run: go test --tags=gaiax_ovc -buildvcs=false -race ./...

      - name: Run tests with tags gaiax_ovc and grpc
        run: go test --tags="gaiax_ovc grpc" -buildvcs=false -race ./...

  build:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26
    needs: test
    env:
      GOPATH: ${{ github.workspace }}/.go
      OUTPUT_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download Go modules
        run: go mod download

      - name: Build binary with gaiax_ovc tag
        run: go build --tags=gaiax_ovc -buildvcs=false -v -o $OUTPUT_NAME ./cmd/

      - name: Build binary with gaiax_ovc and grpc tags
        run: go build --tags="gaiax_ovc grpc" -buildvcs=false -v -o $OUTPUT_NAME-grpc ./cmd/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.OUTPUT_NAME }}
          path: ${{ env.OUTPUT_NAME }}

  docker:
    runs-on: ubuntu-latest
    needs: build
    #if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}